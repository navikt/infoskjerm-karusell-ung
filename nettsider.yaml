# her er listen med nettsider som vises på infoskjermene. Annen config:
#     fanetid: int - tid i sekunder i hver fane
#     vis_standardnettsider: True/False - om standardnettsider skal vises
#     nettsider: list - liste med nettsider som skal vises

infoskjermer:
  # standard-verdier
  standard:
    browser: "chromium-browser" # eller feks firefox
    fanetid: 30
    vis_standardnettsider: True
    nettsider:
      - "https://media.snl.no/media/185807/standard_pride-flagg.png"

