# her er listen med nettsider som vises på infoskjermene. Annen config:
#     fanetid: int - tid i sekunder i hver fane
#     vis_standardnettsider: True/False - om standardnettsider skal vises
#     nettsider: list - liste med nettsider som skal vises

infoskjermer:
  # standard-verdier
  standard:
    browser: "chromium-browser"
    fanetid: 30
    vis_standardnettsider: True
    nettsider:
      - "https://media.snl.no/media/185807/standard_pride-flagg.png"

  # team Uføre sin infoskjerm
  ung:
    fanetid: 60
    vis_standardnettsider: False
    browser: "firefox"
    nettsider:
      # - "https://media.snl.no/media/185807/standard_pride-flagg.png"
      - "https://mon.ruter.no/departures/59.912673-10.801052"
      - "https://metabase.ansatt.nav.no/public/dashboard/8b80d7e8-c93a-432d-a6b7-de2163d8bc24?enhet=1+-+Landet&tab=1379-ug-og-arbeid&tidsperiode=2023-05-31~"
